<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TransporteDB</title>
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --success: #10b981; --success-hover: #059669;
            --dark: #334155; --dark-hover: #1e293b;
            --bg-color: #f1f5f9; --card-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 40px 20px; }
        .dashboard-container { max-width: 900px; width: 100%; display: grid; gap: 24px; }

        .header { text-align: center; margin-bottom: 10px; }
        .header h1 { font-size: 28px; color: var(--text-main); letter-spacing: -0.5px; }
        .header p { color: var(--text-muted); font-size: 15px; margin-top: 5px; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .card h3 { font-size: 18px; margin-bottom: 16px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text-main); }
        .form-control { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; color: white; transition: 0.2s; }
        .btn-success { background-color: var(--success); } .btn-success:hover { background-color: var(--success-hover); }
        .btn-primary { background-color: var(--primary); } .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-dark { background-color: var(--dark); } .btn-dark:hover { background-color: var(--dark-hover); }
        
        .w-100 { width: 100%; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .full-width { grid-column: 1 / -1; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }

        /* Estilos de la Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: var(--text-main); font-weight: 600; border-radius: 6px 6px 0 0; }
        tr:hover { background-color: #f1f5f9; }

        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Sistema de Gestión de Transporte</h1>
            <p>Panel de administración de base de datos</p>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3>Buscar Transacciones</h3>
                <div class="form-group">
                    <label for="id_busqueda">ID del Pasajero</label>
                    <input type="text" id="id_busqueda" class="form-control" placeholder="Ej: PSJ00000000001">
                </div>
                <button class="btn btn-success w-100" onclick="descargarCSV()"> Descargar CSV Filtrado</button>
            </div>

            <div class="card">
                <h3> Registrar Nuevo Pasajero</h3>
                <form id="formAgregar" onsubmit="agregarPasajero(event)">
                    <div class="form-group">
                        <label for="nuevo_id">ID Pasajero</label>
                        <input type="text" id="nuevo_id" class="form-control" placeholder="Ej: PSJ00000000006" required>
                    </div>
                    <div class="form-group">
                        <label for="nuevo_dni">DNI</label>
                        <input type="text" id="nuevo_dni" class="form-control" placeholder="Ej: 71234567" required>
                    </div>
                    <div class="form-group">
                        <label for="nuevo_telefono">Teléfono</label>
                        <input type="text" id="nuevo_telefono" class="form-control" placeholder="Ej: 999888777" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar en BD</button>
                </form>
            </div>

            <div class="card full-width">
                <h3> Vista General de Pasajeros</h3>
                <div class="btn-group">
                    <button class="btn btn-dark" onclick="cargarPasajeros()">Ver / Actualizar Tabla</button>
                    <button class="btn btn-success" onclick="descargarCSVGeneral()">Descargar Toda la BD (Excel)</button>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>ID Pasajero</th>
                            <th>DNI</th>
                            <th>Teléfono</th>
                        </tr>
                    </thead>
                    <tbody id="datos-body">
                        <tr>
                            <td colspan="3" style="text-align: center; color: #64748b;">Haz clic en "Ver / Actualizar Tabla" para cargar los datos</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Descarga por ID específico
        function descargarCSV() {
            const id = document.getElementById('id_busqueda').value;
            if(!id) { alert("Por favor, ingresa el ID del pasajero primero."); return; }
            window.open(`http://localhost:3000/api/transacciones/csv/${id}`, '_blank');
        }

        // Descarga general de toda la tabla transacciones
        function descargarCSVGeneral() {
            window.open(`http://localhost:3000/api/transacciones/csv`, '_blank');
        }

        // Cargar pasajeros en la tabla HTML
        async function cargarPasajeros() {
            try {
                const respuesta = await fetch('http://localhost:3000/api/pasajeros');
                const pasajeros = await respuesta.json();
                
                const tbody = document.getElementById('datos-body');
                tbody.innerHTML = ''; 
                
                pasajeros.forEach(p => {
                    const fila = document.createElement('tr');
                    fila.innerHTML = `<td>${p.pasajero_id}</td><td>${p.dni_pasajero}</td><td>${p.telefono_pasajero}</td>`;
                    tbody.appendChild(fila);
                });
            } catch (error) {
                alert('Error conectando con la BD.');
                console.error(error);
            }
        }

        // Agregar pasajero y refrescar tabla automáticamente
        async function agregarPasajero(event) {
            event.preventDefault();
            const id = document.getElementById('nuevo_id').value;
            const dni = document.getElementById('nuevo_dni').value;
            const telefono = document.getElementById('nuevo_telefono').value;

            try {
                const respuesta = await fetch('http://localhost:3000/api/pasajeros', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, dni, telefono })
                });

                if (respuesta.ok) {
                    alert(" Pasajero guardado exitosamente!");
                    document.getElementById('formAgregar').reset();
                    //recarga la tabla sola después de guardar
                    cargarPasajeros(); 
                } else {
                    alert("Error: Verifica que el ID o DNI no estén repetidos.");
                }
            } catch (error) {
                alert("Error conectando con el servidor. ¿Está encendido el backend?");
            }
        }
    </script>
</body>
</html>
